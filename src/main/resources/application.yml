server:
  port: 56586

spring:
  application:
    name: choosephd-server

  datasource:
    url: jdbc:mysql://localhost:3306/choosephd?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

choosephd:
  jwt:
    secret: choosephd-local-jwt-secret-key-change-in-production
    expiration: 604800000 # 7 days
  data:
    raw-dir: /Users/junw/Desktop/ranking_data 备份 2
  admin:
    username: admin
    password: admin

# 反爬虫告警 — ScrapeAlertScheduler 配置
# channels: 逗号分隔启用的告警通道（log 永远可用，webhook / 自定义通道可加）
# threshold-per-24h: 24h 内单 IP 拦截次数阈值（dev 默认 50，生产可调高）
# window-hours: 扫描窗口（小时）
# sample-limit: 每次扫描的最大样本数（listRecent 上限）
# webhook-url: 启用 webhook 时必填（钉钉 / 飞书 / Slack / 自建系统均可）
scrape:
  alert:
    enabled: true
    channels: log
    threshold-per-24h: 50
    window-hours: 24
    sample-limit: 500
    webhook-url: ""

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui/index.html
  default-produces-media-type: application/json
