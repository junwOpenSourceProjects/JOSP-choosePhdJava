spring:
  application:
    name: choosephd-api
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 18080
  compression:
    enabled: true
  forward-headers-strategy: framework

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

choosephd:
  data:
    raw-dir: ${CHOOSEPHD_RAW_DIR:/Users/junw/Desktop/ranking_data 备份 2}
  security:
    # 自用工具,默认账密:admin / admin
    bootstrap-admin-username: admin
    bootstrap-admin-password: ${CHOOSEPHD_ADMIN_PWD:admin}
    # JWT 签名密钥(≥32 字节,生产请覆盖)
    jwt-secret: ${CHOOSEPHD_JWT_SECRET:choosePhd-jwt-secret-please-change-in-prod-32bytes-min}
    jwt-ttl-hours: 168
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
